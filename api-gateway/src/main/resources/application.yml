server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-reportes
              uri: lb://MS-REPORTES
              predicates:
                - Path=/api/v1/mascotas/**,/api/v1/reportes/**

            - id: ms-usuarios
              uri: lb://MS-USUARIOS
              predicates:
                - Path=/api/v1/auth/**,/api/v1/usuarios/**

            - id: ms-coincidencias
              uri: lb://MS-COINCIDENCIAS
              predicates:
                - Path=/api/v1/coincidencias/**

            - id: ms-geoespacial
              uri: lb://MS-GEOESPACIAL
              predicates:
                - Path=/api/v1/geo/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG