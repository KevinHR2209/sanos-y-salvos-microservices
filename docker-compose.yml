version: '3.8'

# ============================================================
# Sanos y Salvos - Docker Swarm Compose
# Uso:
#   docker swarm init
#   docker stack deploy -c docker-compose.yml sanosysalvos
# ============================================================

networks:
  sanosysalvos-net:
    driver: overlay
    attachable: true

volumes:
  postgres-data:

services:

  # ── Base de datos ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Kevin2209.
      POSTGRES_MULTIPLE_DATABASES: db_reportes,db_usuarios,db_notificaciones
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ── Kafka (cola asíncrona) ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ── Service Registry (Eureka) ──────────────────────────────
  service-registry:
    image: kevinhr2209/service-registry:latest
    build:
      context: ./service-registry
    ports:
      - "8761:8761"
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-usuarios ───────────────────────────────────────────
  ms-usuarios:
    image: kevinhr2209/ms-usuarios:latest
    build:
      context: ./ms-usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_usuarios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Kevin2209.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-reportes ───────────────────────────────────────────
  ms-reportes:
    image: kevinhr2209/ms-reportes:latest
    build:
      context: ./ms-reportes
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_reportes
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Kevin2209.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-coincidencias ──────────────────────────────────────
  ms-coincidencias:
    image: kevinhr2209/ms-coincidencias:latest
    build:
      context: ./ms-coincidencias
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-geoespacial ────────────────────────────────────────
  ms-geoespacial:
    image: kevinhr2209/ms-geoespacial:latest
    build:
      context: ./ms-geoespacial
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-notificaciones ─────────────────────────────────────
  ms-notificaciones:
    image: kevinhr2209/ms-notificaciones:latest
    build:
      context: ./ms-notificaciones
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_notificaciones
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Kevin2209.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── ms-integracion ────────────────────────────────────────
  ms-integracion:
    image: kevinhr2209/ms-integracion:latest
    build:
      context: ./ms-integracion
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  # ── api-gateway ───────────────────────────────────────────
  api-gateway:
    image: kevinhr2209/api-gateway:latest
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    networks:
      - sanosysalvos-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
