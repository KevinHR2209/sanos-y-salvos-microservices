server.port=8086
spring.application.name=ms-integracion

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Feign
spring.cloud.openfeign.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.ms-reportes.sliding-window-size=10
resilience4j.circuitbreaker.instances.ms-reportes.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ms-reportes.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ms-reportes.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.ms-coincidencias.sliding-window-size=10
resilience4j.circuitbreaker.instances.ms-coincidencias.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ms-coincidencias.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ms-coincidencias.permitted-number-of-calls-in-half-open-state=3

# Actuator (expone estado del Circuit Breaker)
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
